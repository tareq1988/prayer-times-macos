name: Release

# Ad-hoc (un-notarized) release path, mirroring scripts/release-local.sh but on a
# CI runner: builds a universal, ad-hoc-signed .app, EdDSA-signs it for Sparkle,
# updates the appcast, and publishes a GitHub Release with the zip.
#
# Manual on purpose: day-to-day releases happen locally via
# scripts/release-local.sh (which also bumps the Homebrew cask). This workflow is
# the same thing on CI for when you don't have a Mac handy. Run ONE path per tag,
# not both — they would otherwise both create the release and push the appcast.
#
#   gh workflow run release.yml -f tag=v0.5.1      # the tag must already exist
#
# Required repository secret:
#   SPARKLE_ED_PRIVATE_KEY   Sparkle EdDSA private key (export: generate_keys -x)
#
# Not notarized: the build is ad-hoc signed, so first launch is right-click → Open.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.5.1)"
        required: true

permissions:
  contents: write   # create the release + commit the appcast

jobs:
  release:
    runs-on: macos-15
    env:
      SCHEME: PrayerTimes
      APP_NAME: "Prayer Times"
      SPARKLE_VERSION: "2.6.4"
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Select Xcode 26
        # The app uses macOS 26 SDK APIs (Liquid Glass `.glassEffect`), so it must
        # build against Xcode 26.x. Runner paths are versioned (e.g. Xcode_26.0.app),
        # so pick the newest match rather than a bare `Xcode_26.app`.
        run: |
          set -euo pipefail
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -z "$XC" ]; then
            echo "::error::No Xcode 26 on this runner (need the macOS 26 SDK). Available:"
            ls -d /Applications/Xcode_*.app
            exit 1
          fi
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Derive version from tag
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches project.yml
        run: |
          set -euo pipefail
          grep -q "MARKETING_VERSION: \"${{ steps.ver.outputs.version }}\"" project.yml \
            || { echo "::error::project.yml MARKETING_VERSION != ${{ steps.ver.outputs.version }} (bump + tag first)"; exit 1; }

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (universal, ad-hoc signed)
        run: |
          set -euo pipefail
          xcodebuild -project PrayerTimes.xcodeproj -scheme "$SCHEME" -configuration Release \
            -destination 'generic/platform=macOS' -derivedDataPath "$RUNNER_TEMP/dd" \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=NO build
          lipo -archs "$RUNNER_TEMP/dd/Build/Products/Release/$APP_NAME.app/Contents/MacOS/$APP_NAME"

      - name: Package zip for distribution
        id: pkg
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/dist"
          ZIP="$RUNNER_TEMP/dist/PrayerTimes-${{ steps.ver.outputs.version }}.zip"
          ditto -c -k --keepParent "$RUNNER_TEMP/dd/Build/Products/Release/$APP_NAME.app" "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$ZIP" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Fetch Sparkle tools
        run: |
          set -euo pipefail
          curl -L -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

      - name: Sign + generate appcast (EdDSA)
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is not set — cannot EdDSA-sign the update."
            exit 1
          fi
          BIN="$RUNNER_TEMP/sparkle/bin"
          # generate_appcast EdDSA-signs every archive in the folder and writes appcast.xml.
          echo "$SPARKLE_ED_PRIVATE_KEY" | "$BIN/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/" \
            "$RUNNER_TEMP/dist"

      - name: Commit appcast to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -f -B main origin/main
          mkdir -p docs
          cp "$RUNNER_TEMP/dist/appcast.xml" docs/appcast.xml
          git add docs/appcast.xml
          git commit -m "chore(release): appcast for ${TAG}" || { echo "no appcast changes"; exit 0; }
          git push origin HEAD:main

      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          NOTES="$RUNNER_TEMP/notes.md"
          awk -v v="${{ steps.ver.outputs.version }}" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > "$NOTES" || true
          if [ ! -s "$NOTES" ]; then echo "Release ${TAG}" > "$NOTES"; fi
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "Prayer Times ${{ inputs.tag }}"
          body_path: ${{ steps.notes.outputs.path }}
          # Only the app zip is a release asset; the appcast is served from GitHub
          # Pages (docs/appcast.xml on main), not attached to the release.
          files: ${{ steps.pkg.outputs.zip }}

      # Bump the Homebrew cask in the tap repo (tareq1988/homebrew-tap), the single
      # source of truth — same as scripts/release-local.sh does locally. Pushes over
      # SSH using TAP_DEPLOY_KEY, a write deploy key scoped to the tap repo (the
      # default GITHUB_TOKEN can't reach another repo). If the secret is absent the
      # run still succeeds and prints the values for a manual bump.
      - name: Bump Homebrew cask
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.pkg.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_DEPLOY_KEY:-}" ]; then
            echo "::notice::TAP_DEPLOY_KEY not set — skipping cask bump. Update Casks/prayer-times.rb manually: version=$VERSION sha256=$SHA256"
            exit 0
          fi
          KEY="$RUNNER_TEMP/tap_deploy_key"
          install -m 600 /dev/null "$KEY"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$KEY"
          export GIT_SSH_COMMAND="ssh -i $KEY -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          git clone -q git@github.com:tareq1988/homebrew-tap.git "$TAP_DIR"
          CASK="$TAP_DIR/Casks/prayer-times.rb"
          sed -i '' -E "s/version \"[^\"]+\"/version \"$VERSION\"/; s/sha256 \"[^\"]+\"/sha256 \"$SHA256\"/" "$CASK"
          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/prayer-times.rb
          git commit -m "chore: bump prayer-times to $VERSION" || { echo "no cask change"; exit 0; }
          git push -q origin HEAD:main
          echo "✓ cask bumped to $VERSION"
