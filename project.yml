name: PrayerTimes
options:
  bundleIdPrefix: co.tareq
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  PrayerKit:
    path: PrayerKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  PrayerTimes:
    type: application
    platform: macOS
    sources:
      - path: PrayerTimes
        excludes:
          - "**/README.md"
    dependencies:
      - package: PrayerKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.tareq.prayertimes
        PRODUCT_NAME: Prayer Times
        INFOPLIST_FILE: PrayerTimes/Supporting/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Local dev signs ad-hoc; CI overrides with Developer ID (spec §13).
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
